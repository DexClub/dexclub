name: Build MCP Package

on:
  workflow_call:
    inputs:
      native_target:
        description: "仅构建指定 DexKit native 目标；留空或 all 时构建全部"
        required: false
        type: string
        default: all

jobs:
  build-mcp-package:
    name: build-mcp-package (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-24.04
            os_name: linux
            arch: x64
            native_file_name: libdexkit.so
            gradle_command: ./gradlew
            msys2_msystem: ""
            msys2_install: ""
            msys2_bin_subdir: ""
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            os_name: linux
            arch: arm64
            native_file_name: libdexkit.so
            gradle_command: ./gradlew
            msys2_msystem: ""
            msys2_install: ""
            msys2_bin_subdir: ""
          - target: android-arm64
            runner: ubuntu-24.04
            os_name: android
            arch: arm64
            native_file_name: libdexkit.so
            gradle_command: ./gradlew
            msys2_msystem: ""
            msys2_install: ""
            msys2_bin_subdir: ""
          - target: windows-x64
            runner: windows-2022
            os_name: windows
            arch: x64
            native_file_name: libdexkit.dll
            gradle_command: .\\gradlew.bat
            msys2_msystem: MINGW64
            msys2_install: >-
              mingw-w64-x86_64-gcc
              mingw-w64-x86_64-cmake
              mingw-w64-x86_64-ninja
              mingw-w64-x86_64-zlib
            msys2_bin_subdir: mingw64/bin
          - target: macos-x64
            runner: macos-15-intel
            os_name: macos
            arch: x64
            native_file_name: libdexkit.dylib
            gradle_command: ./gradlew
            msys2_msystem: ""
            msys2_install: ""
            msys2_bin_subdir: ""
          - target: macos-arm64
            runner: macos-15
            os_name: macos
            arch: arm64
            native_file_name: libdexkit.dylib
            gradle_command: ./gradlew
            msys2_msystem: ""
            msys2_install: ""
            msys2_bin_subdir: ""

    steps:
      - name: Select target
        id: filter
        shell: pwsh
        run: |
          $selectedTarget = "${{ inputs.native_target }}"
          $enabled = [string]::IsNullOrWhiteSpace($selectedTarget) -or
            $selectedTarget -eq "all" -or
            $selectedTarget -eq "${{ matrix.target }}"

          if ($enabled) {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "Skip matrix target: ${{ matrix.target }}"
          }

      - name: Checkout
        if: steps.filter.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        if: steps.filter.outputs.enabled == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        if: steps.filter.outputs.enabled == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        if: steps.filter.outputs.enabled == 'true'
        uses: android-actions/setup-android@v4
        with:
          packages: >-
            platform-tools
            build-tools;36.0.0
            platforms;android-36
            ndk;28.2.13676358
            cmake;3.18.1
            cmake;3.31.6

      - name: Setup MSYS2 toolchain
        if: steps.filter.outputs.enabled == 'true' && runner.os == 'Windows'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msys2_msystem }}
          update: true
          path-type: minimal
          install: ${{ matrix.msys2_install }}

      - name: Prepare Android local.properties
        if: steps.filter.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $sdkDir = $env:ANDROID_SDK_ROOT
          if ([string]::IsNullOrWhiteSpace($sdkDir)) {
            throw "ANDROID_SDK_ROOT is empty after setup-android"
          }

          $sdkDir = $sdkDir -replace '\\', '/'
          "sdk.dir=$sdkDir" | Out-File -FilePath (Join-Path $PWD "local.properties") -Encoding ascii
          "sdk.dir=$sdkDir" | Out-File -FilePath (Join-Path $PWD "dexkit/vendor/DexKit/local.properties") -Encoding ascii

      - name: Download native artifact
        if: steps.filter.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: dexkit-native-${{ matrix.target }}
          path: .ci/native

      - name: Build MCP distribution
        if: steps.filter.outputs.enabled == 'true'
        shell: pwsh
        run: |
          if ($env:RUNNER_OS -eq 'Windows') {
            $msys2Location = "${{ steps.msys2.outputs.msys2-location }}"
            if ([string]::IsNullOrWhiteSpace($msys2Location)) {
              throw "MSYS2 location output is empty on Windows build."
            }

            $toolchainBin = Join-Path $msys2Location "${{ matrix.msys2_bin_subdir }}"
            if (!(Test-Path $toolchainBin)) {
              throw "Missing MSYS2 toolchain bin directory: $toolchainBin"
            }

            $env:PATH = "$toolchainBin;$env:PATH"
            & ".\\gradlew.bat" --no-daemon :mcp:installDist
          } else {
            & "${{ matrix.gradle_command }}" --no-daemon :mcp:installDist
          }

      - name: Package artifact
        if: steps.filter.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $nativeDir = (Resolve-Path (Join-Path $PWD ".ci/native")).Path
          $nativePath = Join-Path $nativeDir "${{ matrix.native_file_name }}"
          if (!(Test-Path $nativePath)) {
            throw "Missing native artifact: $nativePath"
          }

          $installDir = Join-Path $PWD "mcp/build/install/mcp"
          if (!(Test-Path $installDir)) {
            throw "Missing MCP install directory: $installDir"
          }

          $skillsDir = Join-Path $PWD "skills"
          if (!(Test-Path $skillsDir)) {
            throw "Missing skills directory: $skillsDir"
          }

          $licensePath = Join-Path $PWD "LICENSE"
          if (!(Test-Path $licensePath)) {
            throw "Missing LICENSE file: $licensePath"
          }

          $commit = "${{ github.sha }}".Trim()
          if ([string]::IsNullOrWhiteSpace($commit)) {
            $commit = (git rev-parse HEAD).Trim()
          }
          $shortCommit = if ($commit.Length -ge 7) { $commit.Substring(0, 7) } else { $commit }

          $refType = "${{ github.ref_type }}"
          $refName = "${{ github.ref_name }}"
          if ($refType -eq "tag") {
            if ($refName.StartsWith("v")) {
              $version = $refName.Substring(1)
            } else {
              $version = $refName
            }
          } else {
            $version = "dev-$shortCommit"
          }

          $artifactDir = Join-Path $PWD "artifacts"
          $packageDir = Join-Path $PWD ".ci/package"
          if (Test-Path $packageDir) {
            Remove-Item -Recurse -Force $packageDir
          }
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          $targetBaseName = "dexclub-mcp-${{ matrix.os_name }}-${{ matrix.arch }}"
          Copy-Item -Path (Join-Path $installDir "*") -Destination $packageDir -Recurse -Force

          $targetLibDir = Join-Path $packageDir "lib"
          Copy-Item $nativePath (Join-Path $targetLibDir "${{ matrix.native_file_name }}")
          Copy-Item -Path $skillsDir -Destination (Join-Path $packageDir "skills") -Recurse -Force
          Set-Content -Path (Join-Path $packageDir "VERSION") -Value @(
            "commit: $commit"
            "version: $version"
          ) -Encoding ascii
          Copy-Item -Path $licensePath -Destination (Join-Path $packageDir "LICENSE") -Force

          $targetZip = Join-Path $artifactDir "$targetBaseName.zip"
          if (Test-Path $targetZip) {
            Remove-Item -Force $targetZip
          }
          Compress-Archive -Path (Join-Path $packageDir "*") -DestinationPath $targetZip

          $hash = (Get-FileHash -Path $targetZip -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $targetBaseName.zip" | Out-File -FilePath (Join-Path $artifactDir "$targetBaseName.sha256") -Encoding ascii

      - name: Upload package artifact
        if: steps.filter.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dexclub-mcp-${{ matrix.os_name }}-${{ matrix.arch }}
          path: |
            artifacts/dexclub-mcp-${{ matrix.os_name }}-${{ matrix.arch }}.zip
            artifacts/dexclub-mcp-${{ matrix.os_name }}-${{ matrix.arch }}.sha256
          if-no-files-found: error
